version: '3.8'

services:

  db:
    image: postgres:15
    container_name: rockpulse_db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB:       ${DB_NAME}
    ports:
      - "${DB_PORT_EXTERNAL}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Schema is applied automatically on first boot (empty data dir only)
      - ./src/db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - rocknet

  backend:
    build: .
    container_name: rockpulse_backend
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT}:8080"
    volumes:
      # Override baked-in config with Docker-specific settings (host: db)
      - ./config/docker_settings.json:/app/config/app_settings.json:ro
      - ${IMAGE_DIR}:/app/data/inputs
      - ${OUTPUT_DIR}:/app/data/outputs
      - ${MODEL_DIR}:/app/models
      - ${LOG_DIR}:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - rocknet

networks:
  rocknet:
    driver: bridge

volumes:
  postgres_data:
